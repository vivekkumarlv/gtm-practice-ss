<!DOCTYPE html>
<html lang="en">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-P8PDZWKW');</script>

    <meta charset="UTF-8">
    <title>Checkout | Velox Tech</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f5f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; background: #0071e3; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P8PDZWKW" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div class="form-card">
        <h2>Complete Purchase</h2>
        <form id="purchase-form">
            <input type="text" id="cust_name" placeholder="Full Name" required>
            <input type="email" id="cust_email" placeholder="Email Address" required>
            <select id="product_type">
                <option value="buds_pro">Velox Buds Pro - $199</option>
                <option value="watch_5">Velox Watch 5 - $399</option>
            </select>
            <button type="submit">Order Now</button>
        </form>
        <div id="success-msg" style="display:none; text-align:center; color: #06c;">
            <h3>Thank you for your order!</h3>
            <p>We've sent a confirmation email.</p>
        </div>
    </div>

    <script>
        document.getElementById('purchase-form').addEventListener('submit', function(e) {
            e.preventDefault();
            this.style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';

            // IMPORTANT: This pushes data to GTM
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
                'event': 'purchase_complete',
                'transaction_value': document.getElementById('product_type').value === 'buds_pro' ? 199 : 399,
                'product_name': document.getElementById('product_type').value
            });
        });
    </script>
</body>
</html>
